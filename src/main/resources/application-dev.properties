# ── Base de datos H2 (en memoria, sin instalar nada) ─────────────────────────
spring.datasource.url=jdbc:h2:mem:blypdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Consola H2 accesible en http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Hibernate ────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Servidor ─────────────────────────────────────────────────────────────────
server.port=8080

# ── Logs ─────────────────────────────────────────────────────────────────────
logging.level.com.blyp=DEBUG
logging.level.org.springframework.security=DEBUG
